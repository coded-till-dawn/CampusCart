<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details - CampusCart</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i> CampusCart
      </a>
      <div class="search-bar">
        <input type="text" placeholder="Search items..." disabled />
      </div>
      <div class="nav-buttons">
        <a href="index.html" class="nav-btn">
          <i class="fas fa-home"></i> Marketplace
        </a>
        <a href="add-product.html" class="nav-btn">
          <i class="fas fa-plus"></i> Sell
        </a>
        <a href="my-listings.html" class="nav-btn">
          <i class="fas fa-list"></i> My Listings
        </a>
        <a href="wishlist.html" class="nav-btn">
          <i class="fas fa-heart"></i> Wishlist
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <button onclick="window.history.back()" style="margin-bottom: 1rem; padding: 0.6rem 1rem; background: var(--light-color); border: none; border-radius: var(--border-radius); cursor: pointer; font-weight: 600; color: var(--primary-color);">
      <i class="fas fa-arrow-left"></i> Back
    </button>

    <div id="productDetails"></div>

    <!-- Similar Items Section -->
    <div class="similar-items-section" id="similarItemsSection" style="display: none;">
      <h2><i class="fas fa-lightbulb"></i> Similar Items</h2>
      <div class="products-container" id="similarItemsContainer"></div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section" id="chatSection" style="display: none;">
      <div class="chat-header">
        <i class="fas fa-comments"></i> Message the Seller
      </div>
      <div class="messages-list" id="messagesList"></div>
      <form id="chatForm" class="chat-form">
        <input type="text" id="senderName" placeholder="Your Name" required />
        <input type="text" id="senderContact" placeholder="Your Contact (Phone/Email)" required />
        <textarea id="messageText" placeholder="Type your message..." required></textarea>
        <button type="submit" class="chat-submit">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script>
    let currentItemId = null;
    let currentWishlistId = null;

    const loadProductDetails = async () => {
      const params = new URLSearchParams(window.location.search);
      currentItemId = params.get('id');

      if (!currentItemId) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const item = await itemsAPI.getById(currentItemId);
        displayProductDetails(item);
        loadSimilarItems();
        loadMessages();
        checkWishlistStatus();
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
        setTimeout(() => (window.location.href = 'index.html'), 2000);
      }
    };

    const displayProductDetails = (item) => {
      const detailsContainer = document.getElementById('productDetails');

      const editDeleteButtons = `
        <div class="details-actions">
          <button class="btn-wishlist" id="wishlistBtn">
            <i class="fas fa-heart"></i> Add to Wishlist
          </button>
          <a href="edit-product.html?id=${item._id}" class="btn-edit" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-edit"></i> Edit
          </a>
          <button class="btn-delete" onclick="deleteProduct('${item._id}')">
            <i class="fas fa-trash"></i> Delete
          </button>
        </div>
      `;

      const regularButtons = `
        <div class="details-actions" style="gap: 1rem;">
          <button class="btn-wishlist" id="wishlistBtn" style="flex: 1;">
            <i class="fas fa-heart"></i> Add to Wishlist
          </button>
        </div>
      `;

      detailsContainer.innerHTML = `
        <div class="product-details">
          <div class="details-container">
            <img src="${item.image}" alt="${item.title}" class="details-image" />
            <div class="details-info">
              <h1>${item.title}</h1>
              <span class="details-category">${item.category}</span>
              <div class="details-price">${formatCurrency(item.price)}</div>

              <div class="details-meta">
                <div class="meta-item">
                  <span class="meta-label">Location:</span>
                  <span><i class="fas fa-map-marker-alt"></i> ${item.location}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">Seller:</span>
                  <span>${item.sellerName}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">Posted:</span>
                  <span>${formatDate(item.createdAt)}</span>
                </div>
              </div>

              <div class="details-description">
                <h3 style="margin-bottom: 0.5rem; color: var(--dark-color);">Description</h3>
                <p>${item.description}</p>
              </div>

              <div class="details-seller">
                <div class="seller-name"><i class="fas fa-user-circle"></i> ${item.sellerName}</div>
                <div class="seller-contact"><i class="fas fa-phone"></i> ${item.contact}</div>
                <button class="contact-btn" onclick="copyToClipboard('${item.contact}')">
                  Copy Contact
                </button>
              </div>

              ${regularButtons}
            </div>
          </div>
        </div>
      `;

      setupWishlistButton();
    };

    const setupWishlistButton = () => {
      const wishlistBtn = document.getElementById('wishlistBtn');
      wishlistBtn.addEventListener('click', toggleWishlist);
    };

    const checkWishlistStatus = async () => {
      try {
        const result = await wishlistAPI.check(currentItemId);
        if (result.inWishlist) {
          currentWishlistId = result.wishlistId;
          const btn = document.getElementById('wishlistBtn');
          if (btn) {
            btn.classList.add('active');
            btn.innerHTML = '<i class="fas fa-heart"></i> Remove from Wishlist';
          }
        }
      } catch (error) {
        console.error('Error checking wishlist:', error);
      }
    };

    const toggleWishlist = async () => {
      try {
        if (currentWishlistId) {
          await wishlistAPI.remove(currentWishlistId);
          currentWishlistId = null;
          const btn = document.getElementById('wishlistBtn');
          btn.classList.remove('active');
          btn.innerHTML = '<i class="fas fa-heart"></i> Add to Wishlist';
          showToast('Removed from wishlist', 'info');
        } else {
          const result = await wishlistAPI.add(currentItemId);
          currentWishlistId = result._id;
          const btn = document.getElementById('wishlistBtn');
          btn.classList.add('active');
          btn.innerHTML = '<i class="fas fa-heart"></i> Remove from Wishlist';
          showToast('Added to wishlist!', 'success');
        }
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
      }
    };

    const loadSimilarItems = async () => {
      try {
        const items = await itemsAPI.getSimilar(currentItemId);
        if (items.length > 0) {
          const container = document.getElementById('similarItemsContainer');
          const section = document.getElementById('similarItemsSection');
          displayProducts(items, container);
          section.style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading similar items:', error);
      }
    };

    const loadMessages = async () => {
      try {
        const messages = await messagesAPI.getForItem(currentItemId);
        displayMessages(messages);
      } catch (error) {
        console.error('Error loading messages:', error);
      }
    };

    const displayMessages = (messages) => {
      const messagesList = document.getElementById('messagesList');
      const chatSection = document.getElementById('chatSection');

      if (messages.length === 0) {
        messagesList.innerHTML = '<p style="text-align: center; color: #999; padding: 1rem;">No messages yet. Be the first to ask!</p>';
      } else {
        messagesList.innerHTML = messages.map(msg => `
          <div class="message-item">
            <div class="message-sender">${msg.senderName} (${msg.senderContact})</div>
            <div class="message-text">${msg.message}</div>
            <div class="message-time">${formatTime(msg.createdAt)}</div>
          </div>
        `).join('');
      }

      chatSection.style.display = 'block';

      const chatForm = document.getElementById('chatForm');
      chatForm.addEventListener('submit', handleSendMessage);
    };

    const handleSendMessage = async (e) => {
      e.preventDefault();

      const messageData = {
        itemId: currentItemId,
        senderName: document.getElementById('senderName').value,
        senderContact: document.getElementById('senderContact').value,
        message: document.getElementById('messageText').value,
      };

      try {
        await messagesAPI.send(messageData);
        showToast('Message sent successfully!', 'success');
        document.getElementById('chatForm').reset();
        loadMessages();
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
      }
    };

    const displayProducts = (items, container) => {
      container.innerHTML = items.map(item => `
        <div class="product-card" onclick="window.location.href='product-details.html?id=${item._id}'">
          <div class="product-image-container">
            <img src="${item.image}" alt="${item.title}" class="product-image" />
          </div>
          <div class="product-info">
            <span class="product-category">${item.category}</span>
            <h3 class="product-title">${item.title}</h3>
            <div class="product-location">
              <i class="fas fa-map-marker-alt"></i> ${item.location}
            </div>
            <div class="product-price">${formatCurrency(item.price)}</div>
          </div>
        </div>
      `).join('');
    };

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text);
      showToast('Copied to clipboard!', 'success');
    };

    const deleteProduct = async (id) => {
      if (confirm('Are you sure you want to delete this product?')) {
        try {
          await itemsAPI.delete(id);
          showToast('Product deleted successfully!', 'success');
          setTimeout(() => (window.location.href = 'my-listings.html'), 1500);
        } catch (error) {
          showToast(getErrorMessage(error), 'error');
        }
      }
    };

    // Load on page load
    loadProductDetails();
  </script>
</body>
</html>
