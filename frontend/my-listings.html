<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Listings - CampusCart</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i> CampusCart
      </a>
      <div class="search-bar">
        <input type="text" placeholder="Search items..." disabled />
      </div>
      <div class="nav-buttons">
        <a href="index.html" class="nav-btn">
          <i class="fas fa-home"></i> Marketplace
        </a>
        <a href="add-product.html" class="nav-btn">
          <i class="fas fa-plus"></i> Sell
        </a>
        <a href="my-listings.html" class="nav-btn active">
          <i class="fas fa-list"></i> My Listings
        </a>
        <a href="wishlist.html" class="nav-btn">
          <i class="fas fa-heart"></i> Wishlist
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 style="margin-bottom: 2rem; color: var(--dark-color);">
      <i class="fas fa-list"></i> My Listings
    </h1>

    <div class="products-container" id="listingsContainer"></div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script>
    const loadListings = async () => {
      const container = document.getElementById('listingsContainer');
      showLoading(container);

      try {
        const items = await itemsAPI.getAll();
        if (items.length === 0) {
          showEmpty(container, 'You haven\'t listed any products yet');
        } else {
          displayListings(items);
        }
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
      }
    };

    const displayListings = (items) => {
      const container = document.getElementById('listingsContainer');
      container.innerHTML = items.map(item => `
        <div class="product-card">
          <div class="product-image-container">
            <img src="${item.image}" alt="${item.title}" class="product-image" />
          </div>
          <div class="product-info">
            <span class="product-category">${item.category}</span>
            <h3 class="product-title">${item.title}</h3>
            <div class="product-location">
              <i class="fas fa-map-marker-alt"></i> ${item.location}
            </div>
            <div class="product-seller">${item.sellerName}</div>
            <div class="product-price">${formatCurrency(item.price)}</div>
            <div class="product-actions">
              <button class="btn-primary" onclick="viewProduct('${item._id}')">
                <i class="fas fa-eye"></i> View
              </button>
              <button class="btn-secondary" onclick="deleteProduct('${item._id}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </div>
        </div>
      `).join('');
    };

    const viewProduct = (id) => {
      window.location.href = `product-details.html?id=${id}`;
    };

    const deleteProduct = async (id) => {
      if (confirm('Are you sure you want to delete this product?')) {
        try {
          await itemsAPI.delete(id);
          showToast('Product deleted successfully!', 'success');
          loadListings();
        } catch (error) {
          showToast(getErrorMessage(error), 'error');
        }
      }
    };

    // Load on page load
    loadListings();
  </script>
</body>
</html>
