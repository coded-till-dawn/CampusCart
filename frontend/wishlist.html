<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist - CampusCart</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i> CampusCart
      </a>
      <div class="search-bar">
        <input type="text" placeholder="Search items..." disabled />
      </div>
      <div class="nav-buttons">
        <a href="index.html" class="nav-btn">
          <i class="fas fa-home"></i> Marketplace
        </a>
        <a href="add-product.html" class="nav-btn">
          <i class="fas fa-plus"></i> Sell
        </a>
        <a href="my-listings.html" class="nav-btn">
          <i class="fas fa-list"></i> My Listings
        </a>
        <a href="wishlist.html" class="nav-btn active">
          <i class="fas fa-heart"></i> Wishlist
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 style="margin-bottom: 2rem; color: var(--dark-color);">
      <i class="fas fa-heart"></i> My Wishlist
    </h1>

    <div class="products-container" id="wishlistContainer"></div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script>
    const loadWishlist = async () => {
      const container = document.getElementById('wishlistContainer');
      showLoading(container);

      try {
        const wishlistItems = await wishlistAPI.getAll();
        if (wishlistItems.length === 0) {
          showEmpty(container, 'Your wishlist is empty');
        } else {
          displayWishlist(wishlistItems);
        }
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
      }
    };

    const displayWishlist = (wishlistItems) => {
      const container = document.getElementById('wishlistContainer');
      container.innerHTML = wishlistItems.map(wishItem => {
        const item = wishItem.itemId;
        return `
          <div class="product-card" id="wish-${wishItem._id}">
            <div class="product-image-container">
              <img src="${item.image}" alt="${item.title}" class="product-image" />
              <button class="wishlist-btn active" onclick="removeFromWishlist('${wishItem._id}')">
                <i class="fas fa-heart"></i>
              </button>
            </div>
            <div class="product-info">
              <span class="product-category">${item.category}</span>
              <h3 class="product-title">${item.title}</h3>
              <div class="product-location">
                <i class="fas fa-map-marker-alt"></i> ${item.location}
              </div>
              <div class="product-seller">${item.sellerName}</div>
              <div class="product-price">${formatCurrency(item.price)}</div>
              <div class="product-actions">
                <button class="btn-primary" onclick="viewProduct('${item._id}')">
                  <i class="fas fa-eye"></i> View
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    };

    const viewProduct = (id) => {
      window.location.href = `product-details.html?id=${id}`;
    };

    const removeFromWishlist = async (wishlistId) => {
      try {
        await wishlistAPI.remove(wishlistId);
        showToast('Removed from wishlist', 'success');
        document.getElementById(`wish-${wishlistId}`).remove();
        loadWishlist();
      } catch (error) {
        showToast(getErrorMessage(error), 'error');
      }
    };

    // Load on page load
    loadWishlist();
  </script>
</body>
</html>
