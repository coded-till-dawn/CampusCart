<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCart - Student Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-cart"></i> CampusCart
      </a>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search items..." />
      </div>
      <div class="nav-buttons">
        <a href="index.html" class="nav-btn active">
          <i class="fas fa-home"></i> Marketplace
        </a>
        <a href="add-product.html" class="nav-btn">
          <i class="fas fa-plus"></i> Sell
        </a>
        <a href="my-listings.html" class="nav-btn">
          <i class="fas fa-list"></i> My Listings
        </a>
        <a href="wishlist.html" class="nav-btn">
          <i class="fas fa-heart"></i> Wishlist
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Filters & Sort Section -->
    <div class="filter-section">
      <div class="filter-group">
        <label for="categoryFilter">Category:</label>
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Books">Books</option>
          <option value="Electronics">Electronics</option>
          <option value="Furniture">Furniture</option>
          <option value="Clothing">Clothing</option>
          <option value="Sports">Sports</option>
          <option value="Others">Others</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sortFilter">Sort by:</label>
        <select id="sortFilter">
          <option value="">Latest</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
        </select>
      </div>
      <div class="category-buttons" style="flex: 1; margin-left: 1rem;">
        <button class="category-btn" data-category="">All</button>
        <button class="category-btn" data-category="Books">Books</button>
        <button class="category-btn" data-category="Electronics">Electronics</button>
        <button class="category-btn" data-category="Furniture">Furniture</button>
        <button class="category-btn" data-category="Clothing">Clothing</button>
        <button class="category-btn" data-category="Sports">Sports</button>
      </div>
    </div>

    <!-- Products Grid -->
    <div class="products-container" id="productsContainer"></div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
